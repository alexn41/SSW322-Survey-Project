<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="surveytakercss.css">
        <script type="text/javascript" src="surveytaker.js"></script>
    </head>
    <body onload="headerload()">
    <h1 class="mainheader">Current surveys you can take</h1>
        <p  id="surveytakerheader">
             There are no surveys for you to take right now
        </p>
        <h4>Import survey</h4>
        <form action="/upload" method="post" enctype="multipart/form-data">
        <label for="file-upload" class="form-label">Select file:</label>
        <input
            type="file"
            id="file-upload"
            name="file"
            accept=".jpg,.jpeg,.png,.pdf"
            aria-describedby="file-help"
        />
        <div id="file-help" class="form-text">Accepted formats: JPG, PNG, PDF (max 10MB)</div>
        <button type="submit">Upload File</button>
        </form>
        <br>
        <button onclick="window.location.href='survey.html'">Back to Home</button>
